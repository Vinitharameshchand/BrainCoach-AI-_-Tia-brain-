{% extends 'base.html' %}

{% block title %}Login - BrainCoach AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow-lg border-0">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-4 rounded-circle mb-3 floating">
                    <span class="fs-1">🔑</span>
                </div>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Log in to track your child's progress</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control rounded-3 p-3" placeholder="parent@example.com"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control rounded-3 p-3" placeholder="••••••••"
                        required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                    <label class="form-check-label text-muted" for="remember">Keep me logged in</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 shadow">
                    <span class="fs-5">Sign In ✨</span>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">New to BrainCoach? <a href="{{ url_for('auth.register') }}"
                        class="text-primary fw-bold text-decoration-none">Create an account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
