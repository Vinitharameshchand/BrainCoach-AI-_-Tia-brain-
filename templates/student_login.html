<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - BrainCoach AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .brain-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .code-input {
            font-size: 32px;
            letter-spacing: 15px;
            text-align: center;
            padding: 20px;
            border: 3px solid #667eea;
            border-radius: 15px;
            font-weight: bold;
            max-width: 350px;
            margin: 30px auto;
        }
        .code-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .title {
            color: #667eea;
            font-weight: bold;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6c757d;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .parent-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
        }
        .parent-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .parent-link a:hover {
            text-decoration: underline;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }
        .keypad-btn {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .keypad-btn:hover {
            background: #667eea;
            color: white;
        }
        .keypad-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brain-icon">🧠</div>
        <h1 class="title">Welcome Back!</h1>
        <p class="subtitle">Enter your 6-digit access code</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="loginForm">
            <input type="text"
                   name="access_code"
                   id="codeInput"
                   class="form-control code-input"
                   placeholder="••••••"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   inputmode="numeric"
                   autocomplete="off"
                   required
                   autofocus>

            <!-- Optional: Virtual keypad for touchscreen devices -->
            <div class="keypad d-none" id="keypad">
                <button type="button" class="keypad-btn" onclick="addDigit('1')">1</button>
                <button type="button" class="keypad-btn" onclick="addDigit('2')">2</button>
                <button type="button" class="keypad-btn" onclick="addDigit('3')">3</button>
                <button type="button" class="keypad-btn" onclick="addDigit('4')">4</button>
                <button type="button" class="keypad-btn" onclick="addDigit('5')">5</button>
                <button type="button" class="keypad-btn" onclick="addDigit('6')">6</button>
                <button type="button" class="keypad-btn" onclick="addDigit('7')">7</button>
                <button type="button" class="keypad-btn" onclick="addDigit('8')">8</button>
                <button type="button" class="keypad-btn" onclick="addDigit('9')">9</button>
                <button type="button" class="keypad-btn" onclick="clearCode()">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <button type="button" class="keypad-btn" onclick="addDigit('0')">0</button>
                <button type="button" class="keypad-btn" style="visibility: hidden;"></button>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-rocket-takeoff me-2"></i>Start Learning!
            </button>
        </form>

        <div class="parent-link">
            <p class="text-muted mb-0">
                <i class="bi bi-person-circle"></i> Are you a parent?
                <a href="{{ url_for('auth.login') }}">Parent Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const codeInput = document.getElementById('codeInput');
        const loginForm = document.getElementById('loginForm');

        // Auto-submit when 6 digits entered
        codeInput.addEventListener('input', function(e) {
            // Remove non-digits
            this.value = this.value.replace(/\D/g, '');

            // Auto-submit when 6 digits
            if (this.value.length === 6) {
                setTimeout(() => {
                    loginForm.submit();
                }, 300);
            }
        });

        // Virtual keypad functions (optional)
        function addDigit(digit) {
            if (codeInput.value.length < 6) {
                codeInput.value += digit;
                if (codeInput.value.length === 6) {
                    setTimeout(() => loginForm.submit(), 300);
                }
            }
        }

        function clearCode() {
            codeInput.value = codeInput.value.slice(0, -1);
        }

        // Show keypad toggle (optional feature)
        const showKeypad = localStorage.getItem('showKeypad') === 'true';
        if (showKeypad) {
            document.getElementById('keypad').classList.remove('d-none');
        }
    </script>
</body>
</html>
